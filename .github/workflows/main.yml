on:
  push:
    branches: [ master ]   # master 브랜치 push 시 자동 실행

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: EC2 접속 후 배포
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. 최신 코드로 업데이트
            cd /home/ec2-user/ui/web/popup-paging-web
            git pull origin master

            # 2. Maven 빌드 (테스트 생략, WAR 파일 생성)
            mvn clean package -DskipTests

            # 3. WAR 파일 존재 여부 확인
            LATEST_WAR=$(ls -t target/*.war 2>/dev/null | head -n 1)
            if [ -z "$LATEST_WAR" ]; then
              echo "ERROR: WAR 파일이 생성되지 않았습니다. 빌드 로그를 확인하세요."
              exit 1
            fi

            # 4. Tomcat 종료 (이미 꺼져있는 경우도 정상 처리)
            /home/ec2-user/ui/tomcat/bin/shutdown.sh || pkill -f tomcat || true
            sleep 5

            # 5. 기존 배포 파일 제거 (캐시 문제 방지)
            rm -rf /home/ec2-user/ui/tomcat/webapps/ROOT*

            # 6. 최신 WAR를 ROOT.war로 배포
            cp "$LATEST_WAR" /home/ec2-user/ui/tomcat/webapps/ROOT.war

            # 7. Tomcat 재시작
            /home/ec2-user/ui/tomcat/bin/startup.sh
